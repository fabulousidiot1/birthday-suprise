<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        text-align: center;
    }
    .card {
        background: rgba(0,0,0,0.3);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 400px;
    }
    h1 {
        font-size: 2.5em;
    }
    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background: #ff6f91;
        color: white;
        font-size: 1em;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background: #ff3d6d;
    }
    #secret {
        margin-top: 20px;
        font-size: 1.1em;
        display: none;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="card">
    <h1>🎂 Happy Birthday, Krithikshaa! 💖</h1>
    <p>You make every day brighter ✨</p>

    <button onclick="showMessage()">Open Your Surprise 🎁</button>

    <p id="secret"></p>
</div>

<script>
function showMessage() {
    const message = `
    I don’t know if I say this enough,  

    I hope today brings you as much happiness  
    as you bring to people around you ✨  

    Once again… Happy Birthday 🎂  
    Keep being amazing 🌸
    `;

    const secret = document.getElementById("secret");
    secret.style.display = "block";
    secret.innerHTML = message;
}
</script>

</body>
</html>
